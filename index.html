<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebSplit Replica</title>
    <style>
        body { background-color: #1a1a1a; color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #livesplit-container { background-color: #2b2b2b; width: 350px; padding: 20px; border-radius: 5px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #timer { font-family: 'Courier New', Courier, monospace; font-size: 64px; font-weight: bold; text-align: center; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { color: #aaa; font-size: 14px; padding-bottom: 10px; }
        td { padding: 8px 0; font-size: 18px; border-bottom: 1px solid #3d3d3d; }
        .pb { text-align: right; color: #ccc; }
        .actual { text-align: right; font-weight: bold; }
        .delta { text-align: right; width: 60px; font-weight: bold; }
        .green { color: #4CFF4C; } /* Faster than PB */
        .red { color: #FF4C4C; }   /* Slower than PB */
        .controls { margin-top: 20px; display: flex; justify-content: space-between; gap: 10px; }
        button { flex: 1; padding: 10px; cursor: pointer; background: #444; color: white; border: none; border-radius: 3px; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #666; }
    </style>
</head>
<body>

<div id="livesplit-container">
    <div id="timer">00:00.00</div>
    <table>
        <thead><tr><th>Segment</th><th class="pb">PB</th><th class="actual">Actual</th><th class="delta">Delta</th></tr></thead>
        <tbody id="split-list">
            <!-- Splits will be generated by JS -->
        </tbody>
    </table>

    <div class="controls">
        <button onclick="toggleTimer()" id="startBtn">Start</button>
        <button onclick="doSplit()">Split</button>
        <button onclick="resetTimer()">Reset</button>
    </div>
</div>
